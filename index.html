<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">

<title>Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #3a3a3a;
    --paper: #f5f1ea;
    --paper-deep: #ede7dc;
    --accent: #b8001f;
    --accent-soft: #d4a5ad;
    --rule: #c9c0b0;
    --gold: #a08654;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px -8px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    font-weight: 400;
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184,0,31,0.03) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(160,134,84,0.04) 0%, transparent 40%);
    background-attachment: fixed;
  }

  /* ===== Header ===== */
  header.masthead {
    border-bottom: 3px double var(--ink);
    padding: 36px 48px 24px;
    background: var(--paper);
    position: relative;
  }

  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 12px;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .masthead-top .vol { color: var(--accent); font-weight: 500; }

  .masthead-headline {
    display: flex;
    flex-direction: column;
  }

  .masthead-title {
    font-family: 'Bricolage Grotesque', 'Inter Tight', sans-serif;
    font-weight: 800;
    font-size: clamp(40px, 5.5vw, 68px);
    line-height: 1;
    letter-spacing: -0.025em;
    font-variation-settings: "opsz" 96, "wght" 800;
  }

  .masthead-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.32em;
    color: var(--paper);
    background: var(--accent);
    padding: 5px 12px 5px 16px;
    line-height: 1;
  }

  .masthead-title em {
    font-style: normal;
    color: var(--accent);
    font-weight: 800;
  }

  .masthead-sub {
    margin-top: 10px;
    font-family: 'Bricolage Grotesque', 'Inter Tight', sans-serif;
    font-style: normal;
    font-size: 17px;
    color: var(--ink-soft);
    font-weight: 500;
    letter-spacing: 0.01em;
    font-variation-settings: "opsz" 24, "wght" 500;
  }

  /* ===== Tab Navigation ===== */
  .tab-bar {
    background: var(--paper-deep);
    border-bottom: 1px solid var(--rule);
    padding: 0 48px;
    display: flex;
    align-items: stretch;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(8px);
  }

  .tab-bar::-webkit-scrollbar { height: 4px; }
  .tab-bar::-webkit-scrollbar-thumb { background: var(--rule); }

  .tab {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 26px 14px;
    cursor: pointer;
    border-right: 1px solid var(--rule);
    transition: background 0.25s ease, color 0.25s ease;
    white-space: nowrap;
    position: relative;
    min-width: 156px;
    background: transparent;
    border-top: none;
    border-bottom: none;
    border-left: none;
    font-family: inherit;
    text-align: left;
  }

  .tab::before {
    content: '';
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 0;
    height: 3px;
    background: var(--accent);
    transition: width 0.3s ease, left 0.3s ease;
  }

  .tab:first-child { border-left: 1px solid var(--rule); }

  .tab:hover {
    background: var(--paper);
  }

  .tab.active {
    background: var(--paper);
  }

  .tab.active::before {
    width: 100%;
    left: 0;
  }

  .tab-week {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 3px;
    transition: color 0.25s ease;
  }

  .tab.active .tab-week { color: var(--accent); font-weight: 500; }

  .tab-date {
    font-family: 'Bricolage Grotesque', 'Inter Tight', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    font-variation-settings: "opsz" 24, "wght" 600;
  }

  .tab-close {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tab:hover .tab-close { opacity: 0.5; }
  .tab-close:hover { opacity: 1 !important; color: var(--accent); }

  .tab-add {
    padding: 14px 24px;
    cursor: pointer;
    background: transparent;
    border: none;
    border-left: 1px solid var(--rule);
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--ink-soft);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab-add:hover { color: var(--accent); background: var(--paper); }
  .tab-add-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ===== Main Content ===== */
  main {
    max-width: 1180px;
    margin: 0 auto;
    padding: 48px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Stagger the section reveals slightly */
  .section { animation: sectionIn 0.6s ease backwards; }
  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.12s; }
  .section:nth-child(3) { animation-delay: 0.19s; }
  .section:nth-child(4) { animation-delay: 0.26s; }
  .section:nth-child(5) { animation-delay: 0.33s; }

  @keyframes sectionIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .meeting-meta {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 0;
    background: var(--paper-deep);
    border-radius: 4px;
    padding: 18px 24px;
    margin-bottom: 14px;
    border: none;
  }

  .meta-cell {
    padding: 0 20px;
    border-right: 1px solid var(--rule);
    line-height: 1.3;
  }
  .meta-cell:last-child { border-right: none; }
  .meta-cell:first-child { padding-left: 0; }

  .attendees-row {
    padding: 14px 22px;
    margin-bottom: 36px;
    background: var(--paper-deep);
    border-radius: 4px;
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }

  .attendees-row .meta-label {
    margin-bottom: 0;
    flex-shrink: 0;
  }

  .attendees-row .meta-value {
    flex: 1;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.55;
  }

  .meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
    display: block;
    font-weight: 500;
  }

  .meta-value {
    font-family: 'Bricolage Grotesque', 'Inter Tight', 'Noto Sans TC', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    letter-spacing: -0.005em;
    font-variation-settings: "opsz" 24, "wght" 600;
  }

  .meta-value.editable {
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    cursor: text;
  }
  .meta-value.editable:hover { border-bottom-color: var(--rule); }
  .meta-value.editable:focus {
    outline: none;
    border-bottom-color: var(--accent);
  }

  /* ===== Section ===== */
  .section {
    margin-bottom: 64px;
    position: relative;
  }

  .section-header {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: end;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }

  .section-header::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -5px;
    height: 1px;
    background: var(--ink);
  }

  .section-num {
    font-family: 'Bricolage Grotesque', 'Inter Tight', sans-serif;
    font-style: normal;
    font-size: 44px;
    color: var(--accent);
    font-weight: 800;
    line-height: 0.85;
    letter-spacing: -0.04em;
    text-align: left;
    font-variation-settings: "opsz" 96, "wght" 800;
  }

  .section-title {
    font-family: 'Bricolage Grotesque', 'Inter Tight', 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1.15;
    align-self: end;
    padding-bottom: 4px;
    font-variation-settings: "opsz" 48, "wght" 700;
  }

  .section-content {
    font-family: 'Inter Tight', 'Noto Sans TC', sans-serif;
    font-size: 15.5px;
    color: var(--ink-soft);
    line-height: 1.85;
  }

  /* Drop cap removed per request */

  .section-content[contenteditable="true"] {
    min-height: 60px;
    padding: 12px 16px;
    border-left: 2px solid transparent;
    transition: border-color 0.2s ease, background 0.2s ease;
    border-radius: 2px;
  }
  .section-content[contenteditable="true"]:hover {
    border-left-color: var(--rule);
    background: rgba(255,255,255,0.4);
  }
  .section-content[contenteditable="true"]:focus {
    outline: none;
    border-left-color: var(--accent);
    background: rgba(255,255,255,0.6);
  }

  .section-content p { margin-bottom: 14px; }
  .section-content strong { color: var(--ink); font-weight: 600; }
  .section-content ul { margin-left: 4px; margin-bottom: 14px; padding-left: 22px; list-style: none; }
  .section-content ul li {
    margin-bottom: 8px;
    position: relative;
    padding-left: 4px;
  }
  .section-content ul li::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 0.7em;
    width: 8px;
    height: 1px;
    background: var(--accent);
  }
  .section-content ul ul {
    margin-top: 6px;
    margin-bottom: 8px;
    padding-left: 20px;
  }
  .section-content ul ul li::before {
    background: var(--rule);
    width: 6px;
  }
  .section-content ol { margin-left: 4px; margin-bottom: 14px; padding-left: 28px; }
  .section-content ol li { margin-bottom: 8px; padding-left: 4px; }
  .section-content ol li::marker {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--accent);
    font-weight: 500;
  }
  .section-content a {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }
  .section-content a:hover { opacity: 0.75; }

  /* ===== Action Items Table ===== */
  .actions-section {
    background: linear-gradient(180deg, var(--paper-deep) 0%, rgba(184,0,31,0.025) 100%);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--accent);
    padding: 40px 36px 32px;
    margin-top: 56px;
    position: relative;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 12px 32px -16px rgba(184,0,31,0.12);
  }

  .actions-section::before {
    content: 'ACTION ITEMS';
    position: absolute;
    top: -12px;
    left: 32px;
    background: var(--paper);
    padding: 4px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--accent);
    font-weight: 600;
    border: 1px solid var(--accent);
  }

  .actions-section::after {
    content: 'TO BE COMPLETED · 待辦事項';
    position: absolute;
    top: -10px;
    right: 32px;
    background: var(--paper);
    padding: 0 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    font-weight: 400;
  }

  .actions-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 14.5px;
  }

  .actions-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: left;
    padding: 10px 14px;
    border-bottom: 2px solid var(--ink);
    font-weight: 500;
  }

  .actions-table tbody tr {
    transition: background 0.2s ease;
  }
  .actions-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.5);
  }

  .actions-table td {
    padding: 14px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
    color: var(--ink-soft);
    font-family: 'Inter Tight', 'Noto Sans TC', sans-serif;
  }

  .actions-table td[contenteditable="true"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    background: rgba(255,255,255,0.5);
  }

  .actions-table tr:last-child td { border-bottom: none; }

  .actions-table .col-num {
    font-family: 'Bricolage Grotesque', 'Inter Tight', sans-serif;
    font-style: normal;
    color: var(--accent);
    width: 50px;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.4;
    padding-left: 6px;
    letter-spacing: -0.03em;
    font-variation-settings: "opsz" 24, "wght" 800;
  }

  .actions-table .col-task { width: 60%; color: var(--ink); white-space: pre-wrap; line-height: 1.7; font-weight: 500; }
  .actions-table .col-owner {
    width: 32%;
    color: var(--ink-soft);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .actions-table .col-action { width: 40px; }

  .row-delete {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    opacity: 0.3;
    font-size: 16px;
    transition: all 0.2s;
    padding: 4px;
  }
  .row-delete:hover { opacity: 1; color: var(--accent); }

  .add-row-btn {
    margin-top: 16px;
    padding: 8px 16px;
    background: transparent;
    border: 1px dashed var(--rule);
    color: var(--ink-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-row-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    border-style: solid;
  }

  /* ===== Carry-over from previous week ===== */
  .carryover-section {
    border: 1px solid var(--rule);
    border-left: 3px solid var(--gold);
    background: rgba(160, 134, 84, 0.04);
    padding: 24px 28px;
    margin-bottom: 56px;
    position: relative;
  }

  .carryover-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 4px;
    display: block;
  }

  .carryover-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .carryover-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }

  .carryover-list {
    list-style: none;
    padding: 0;
    margin: 0;
    counter-reset: carry;
  }

  .carryover-item {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--rule);
    align-items: start;
  }
  .carryover-item:last-child { border-bottom: none; }

  .carryover-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--gold);
    line-height: 1.6;
  }

  .carryover-task {
    font-family: 'Inter Tight', 'Noto Sans TC', sans-serif;
    font-size: 14.5px;
    color: var(--ink);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .carryover-owner {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--paper-deep);
    padding: 4px 10px;
    border-radius: 2px;
    white-space: nowrap;
    align-self: start;
    margin-top: 2px;
  }

  .carryover-empty {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 15px;
    padding: 8px 0;
  }

  .carryover-dismiss {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .carryover-dismiss:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .carryover-restore {
    margin-bottom: 32px;
    text-align: left;
  }

  .carryover-restore-btn {
    background: transparent;
    border: 1px dashed var(--rule);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }
  .carryover-restore-btn:hover {
    color: var(--gold);
    border-color: var(--gold);
    border-style: solid;
  }
  .toolbar {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }

  /* ===== Read-only mode ===== */
  .readonly-badge {
    background: var(--ink);
    color: var(--paper);
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    font-weight: 500;
    margin-right: 12px;
  }

  .read-only .meta-value,
  .read-only .section-title,
  .read-only .section-content,
  .read-only .actions-table td {
    cursor: default !important;
  }

  .read-only .meta-value:hover,
  .read-only .section-title:hover,
  .read-only .section-content:hover {
    border-color: transparent !important;
    background: transparent !important;
  }

  .tool-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.2s;
  }

  .tool-btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }

  .tool-btn.secondary {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .tool-btn.secondary:hover {
    background: var(--ink);
    color: var(--paper);
  }

  /* ===== Empty state ===== */
  .empty-state {
    text-align: center;
    padding: 120px 24px;
    color: var(--ink-soft);
  }

  .empty-state-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 32px;
    margin-bottom: 12px;
    color: var(--ink);
  }

  /* ===== Footer ===== */
  footer {
    margin-top: 80px;
    padding: 32px 48px;
    border-top: 3px double var(--ink);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
    position: relative;
  }

  footer::before {
    content: '◆';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    padding: 0 12px;
    color: var(--accent);
    font-size: 12px;
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 100px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    header.masthead { padding: 24px; }
    .tab-bar { padding: 0 16px; }
    main { padding: 24px 20px; }
    .meeting-meta { grid-template-columns: 1fr 1fr; }
    .meta-cell { border-bottom: 1px solid var(--rule); padding: 12px; }
    .meta-cell:nth-child(2) { border-right: none; }
    .actions-table { font-size: 13px; }
    .actions-table th, .actions-table td { padding: 8px; }
    .toolbar { bottom: 16px; right: 16px; }
  }

  /* Print styles */
  @media print {
    .tab-bar, .toolbar, .tab-close, .row-delete, .add-row-btn { display: none !important; }
    body { background: white; }
    main { max-width: 100%; padding: 0; }
  }
</style>
</head>

<style>
  /* Gate-only styles — kept inline so they apply before fonts load */
  .gate-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper, #f5f1ea);
    font-family: 'Noto Sans TC', system-ui, sans-serif;
    padding: 24px;
  }
  .gate-card {
    background: white;
    border: 1px solid var(--rule, #c9c0b0);
    border-radius: 4px;
    padding: 40px 36px;
    max-width: 380px;
    width: 100%;
    box-shadow: var(--shadow, 0 8px 24px -8px rgba(0,0,0,0.08));
  }
  .gate-card h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--ink, #1a1a1a);
  }
  .gate-card p {
    font-size: 13px;
    color: var(--ink-soft, #3a3a3a);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .gate-card input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--rule, #c9c0b0);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    margin-bottom: 12px;
    background: var(--paper, #f5f1ea);
    color: var(--ink, #1a1a1a);
  }
  .gate-card input:focus { outline: none; border-color: var(--accent, #b8001f); }
  .gate-card button {
    width: 100%;
    padding: 10px 12px;
    background: var(--ink, #1a1a1a);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .gate-card button:hover { background: var(--accent, #b8001f); }
  .gate-card button:disabled { opacity: 0.5; cursor: wait; }
  .gate-error { color: var(--accent, #b8001f); font-size: 12px; margin-top: 10px; min-height: 16px; }
</style>

    <button type="submit" id="gateBtn">Unlock</button>

<script>
(function() {
  const ITER = 250000;
  const blob_b64 = document.getElementById('encrypted-blob').textContent.trim();

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMat = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: ITER, hash: 'SHA-256' },
      keyMat,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function tryDecrypt(password) {
    const blob = b64ToBytes(blob_b64);
    const salt = blob.slice(0, 16);
    const iv = blob.slice(16, 28);
    const ct = blob.slice(28);
    const key = await deriveKey(password, salt);
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return new TextDecoder().decode(pt);
  }

  function rerunScripts(container) {
    const scripts = container.querySelectorAll('script');
    scripts.forEach(old => {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.text = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
  }

  document.getElementById('gateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('gatePass').value;
    const btn = document.getElementById('gateBtn');
    const err = document.getElementById('gateErr');
    btn.disabled = true;
    btn.textContent = 'Unlocking...';
    err.textContent = '';
    try {
      const html = await tryDecrypt(pw);
      // Remove gate, inject decrypted content, run scripts
      document.getElementById('gate').remove();
      document.getElementById('encrypted-blob').remove();
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      // Move children to body to preserve original DOM structure
      while (wrap.firstChild) document.body.appendChild(wrap.firstChild);
      rerunScripts(document.body);
    } catch (ex) {
      err.textContent = 'Incorrect access key.';
      btn.disabled = false;
      btn.textContent = 'Unlock';
      document.getElementById('gatePass').select();
    }
  });
})();
</script>
